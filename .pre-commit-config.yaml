repos:
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: no-commit-to-branch
        args: ["--branch", "main"]
      - id: check-yaml
      - id: check-merge-conflict
      - id: trailing-whitespace
        args: ["--markdown-linebreak-ext=.md"]
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: mdlint-obsidian
        name: mdlint-obsidian (wikilinks + frontmatter)
        entry: mdlint wiki/ --vault wiki/ --severity error
        language: python
        additional_dependencies: [mdlint-obsidian]
        types: [markdown]
        pass_filenames: false
        always_run: true

      - id: remark-frontmatter-schema
        name: remark frontmatter schema validation
        entry: npx remark wiki/ --frail
        language: node
        additional_dependencies:
          - remark-cli
          - remark-frontmatter
          - remark-lint-frontmatter-schema
        types: [markdown]
        pass_filenames: false
        always_run: true

      - id: wiki-health
        name: wiki health check (errors only)
        entry: bash .llm-wiki/scripts/pre-commit-check.sh
        language: system
        types: [markdown]
        pass_filenames: false
        always_run: true

      - id: protect-raw
        name: prevent modifications to raw/
        entry: bash .llm-wiki/scripts/pre-commit-raw-protect.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: unique-filenames
        name: enforce unique filenames across wiki/
        entry: bash .llm-wiki/scripts/pre-commit-unique-filenames.sh
        language: system
        pass_filenames: false
        always_run: true
