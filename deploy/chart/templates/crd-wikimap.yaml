apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wikimaps.llm-wiki.dev
  labels:
    app.kubernetes.io/name: llm-wiki
    app.kubernetes.io/component: controller
spec:
  group: llm-wiki.dev
  scope: Namespaced
  names:
    plural: wikimaps
    singular: wikimap
    kind: WikiMap
    shortNames: [wm]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Workflow
          type: string
          jsonPath: .spec.workflow
        - name: Source
          type: string
          jsonPath: .spec.source.repo
        - name: Language
          type: string
          jsonPath: .spec.source.language
        - name: Wiki
          type: string
          jsonPath: .spec.destination.wikiRepo
        - name: Last-Revision
          type: string
          jsonPath: .status.lastProcessedRevision
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [source, destination]
              properties:
                workflow:
                  type: string
                  enum: [lc4, generic]
                  default: lc4
                  description: >
                    Documentation workflow. 'lc4' generates a RIG from the
                    source code and runs architecture documentation (LikeC4 model
                    + Mermaid). 'generic' treats the source as raw documentation
                    material (READMEs, articles, configs) and runs generic
                    documentation updates (Mermaid only).
                source:
                  type: object
                  required: [repo]
                  description: The project repository to document.
                  properties:
                    repo:
                      type: string
                      description: Git URL or Flux GitRepository CR name in this namespace.
                    branch:
                      type: string
                      default: main
                    language:
                      type: string
                      enum: [go, zig, python, rust, typescript]
                      description: >
                        Programming language — selects the RIG emitter.
                        Required for workflow 'lc4'. Ignored for 'generic'.
                destination:
                  type: object
                  required: [wikiRepo, projectDir]
                  description: Where to commit generated artifacts.
                  properties:
                    wikiRepo:
                      type: string
                      description: Git URL of the wiki repository.
                    wikiBranch:
                      type: string
                      default: main
                    projectDir:
                      type: string
                      description: >
                        Directory within the wiki repo. For 'lc4': raw/arch/<project>.
                        For 'generic': raw/<project>.
            status:
              type: object
              properties:
                lastProcessedRevision:
                  type: string
                lastRigSha256:
                  type: string
                lastRunAt:
                  type: string
                  format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: [True, False, Unknown]
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
