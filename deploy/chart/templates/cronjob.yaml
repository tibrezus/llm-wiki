{{- if .Values.keda.enabled }}
# KEDA ScaledJob — event-driven, scale-to-zero agent runtime.
# Replaces the CronJob when KEDA is installed. Triggers:
#   1. cron fallback (every 30m)
#   2. (future) Dapr pub/sub trigger via cloudevents
apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  maxReplicaCount: 1
  pollingInterval: 30
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  triggers:
    - type: cron
      metadata:
        timezone: "UTC"
        start: "{{ .Values.cronStart }}"
        {{- if .Values.cronEnd }}
        end: "{{ .Values.cronEnd }}"
        {{- end }}
  jobTargetRef:
    {{- include "llm-wiki-controller.jobTemplate" . | nindent 4 }}
{{- else }}
# CronJob fallback (when KEDA is not installed)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: "{{ .Values.schedule }}"
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      {{- include "llm-wiki-controller.jobTemplate" . | nindent 6 }}
{{- end }}
