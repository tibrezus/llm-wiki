apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: "{{ .Values.schedule }}"
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      timeout: {{ .Values.jobTimeout }}
      template:
        spec:
          serviceAccountName: {{ include "llm-wiki-controller.fullname" . }}
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: rig-controller
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: NAMESPACE
                  value: {{ .Values.namespace | quote }}
                {{- with .Values.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              {{- if .Values.sshKey.enabled }}
              volumeMounts:
                - name: ssh-key
                  mountPath: /root/.ssh
                  readOnly: true
              {{- end }}
          {{- if .Values.sshKey.enabled }}
          volumes:
            - name: ssh-key
              projected:
                sources:
                  - secret:
                      name: {{ .Values.sshKey.secretName }}
                      items:
                        - key: id_ed25519
                          path: id_ed25519
                          mode: 0600
                  - configMap:
                      name: {{ include "llm-wiki-controller.fullname" . }}-known-hosts
          {{- end }}
