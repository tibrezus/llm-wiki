{{/*
Event subscriber — always-on Dapr pub/sub consumer.

Subscribes to the `wiki.docs.updated` topic (published by reconcile.sh after
every successful documentation sync) and records a Kubernetes Event on the
source WikiMap CR for each one. This is the first consumer of the event bus and
makes pipeline activity observable via `kubectl get events`.

Redis pub/sub is fire-and-forget, so this MUST be an always-on Deployment — it
cannot live inside the scale-to-zero controller ScaledJob or it would miss
events fired while scaled down.
*/}}
{{- if .Values.subscriber.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}-subscriber
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-wiki-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: event-subscriber
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-wiki-controller
      app.kubernetes.io/component: event-subscriber
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-wiki-controller
        app.kubernetes.io/component: event-subscriber
      {{- if .Values.dapr.enabled }}
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "wiki-event-subscriber"
        dapr.io/app-port: {{ .Values.subscriber.port | quote }}
        dapr.io/log-as-json: "true"
      {{- end }}
    spec:
      serviceAccountName: {{ include "llm-wiki-controller.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: event-subscriber
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/usr/local/bin/event-subscriber.py"]
          ports:
            - name: http
              containerPort: {{ .Values.subscriber.port }}
          env:
            - name: NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: PORT
              value: {{ .Values.subscriber.port | quote }}
            - name: DAPR_PUBSUB
              value: {{ .Values.subscriber.pubsub | default "pubsub" | quote }}
            - name: DAPR_STATE_STORE
              value: statestore
          {{- with .Values.subscriber.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}-subscriber
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "llm-wiki-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: event-subscriber
spec:
  selector:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/component: event-subscriber
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
