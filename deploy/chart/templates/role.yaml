{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Read and patch WikiMap CRs (our own CRD).
  - apiGroups: ["llm-wiki.dev"]
    resources: ["wikimaps"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Read Flux GitRepository CRs (to resolve source artifacts).
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list"]
{{- end }}
