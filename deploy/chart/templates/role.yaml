{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-wiki-controller.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: llm-wiki-controller
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Read and patch WikiMap CRs (our own CRD).
  - apiGroups: ["llm-wiki.dev"]
    resources: ["wikimaps", "wikimaps/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Read Flux GitRepository CRs (to resolve source artifacts).
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["gitrepositories"]
    verbs: ["get", "list"]
  # Create Kubernetes Events (used by the event subscriber to surface doc
  # syncs on the WikiMap CR; also used by reconcile for status events).
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
