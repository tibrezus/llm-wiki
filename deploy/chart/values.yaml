# Default values for llm-wiki-controller.
# These are overridden by k8s-config's HelmRelease values.

# Controller image — the module's Dockerfile.
image:
  repository: ghcr.io/tibrezus/llm-wiki-controller
  tag: "0.1.0"
  pullPolicy: Always

# Image pull secrets for private registries.
imagePullSecrets:
  - name: ghcr-pull

# The namespace to watch for WikiMap CRs.
namespace: llm-wiki

# Reconciliation schedule (CronJob format).
schedule: "*/30 * * * *"

# Job settings.
concurrencyPolicy: Forbid
failedJobsHistoryLimit: 3
successfulJobsHistoryLimit: 1
jobTimeout: 30m

# RBAC — the controller needs to read/patch WikiMap CRs and read GitRepositories.
rbac:
  create: true

# Resource limits for the agent pods.
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# SSH key for pushing to non-GitHub wikis (Codeberg, Forgejo, etc.).
sshKey:
  enabled: false
  secretName: ""

# Known hosts entries for SSH git push.
knownHosts: []

# KEDA ScaledJob (event-driven, scale-to-zero).
# When enabled, replaces CronJob with a KEDA ScaledJob.
# Requires KEDA to be installed in the cluster (infrastructure/keda).
keda:
  enabled: false
  cronStart: "*/30 * * * *"
  cronEnd: ""

# Dapr sidecar injection (state store + pub/sub abstraction).
# When enabled, injects a Dapr sidecar into each agent pod.
# The agent uses Dapr HTTP API (localhost:3500) for state and events.
dapr:
  enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# Persistent cache (JuiceFS PVC) for git repos, language caches, sessions.
# When enabled, mounts a ReadWriteMany PVC at /cache.
cache:
  enabled: false
  pvcName: "llm-wiki-cache"

# Extra environment variables injected into the agent pods.
extraEnv: []
