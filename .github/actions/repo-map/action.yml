name: "Repo Map (RIG)"
description: "Produce a Repository Intelligence Graph (RIG) JSON from the repo's build system. Publishes as a Release asset for wiki consumption."

inputs:
  language:
    description: "Primary programming language (go, typescript, python, rust, ...)"
    required: true
  output:
    description: "Output file path (default: repo-map.json)"
    required: false
    default: "repo-map.json"

runs:
  using: "composite"
  steps:
    - name: Generate RIG JSON
      shell: bash
      env:
        LANGUAGE: ${{ inputs.language }}
        OUTPUT: ${{ inputs.output }}
      run: |
        # Universal emitter (emit-rig.sh → emit-rig.py). Auto-detects every build
        # system in the repo; the language input is a hint, not a dispatch key.
        # This is the SAME emitter the in-cluster harmostes / llm-wiki controller
        # uses, so the project-CI RIG and the wiki RIG stay consistent and share
        # every emitter fix — no per-language drift.
        EMITTER="${GITHUB_ACTION_PATH}/emit-rig.sh"
        if [ ! -f "$EMITTER" ]; then
          echo "::error::Universal RIG emitter (emit-rig.sh) not found in the action."
          exit 1
        fi
        bash "$EMITTER" "$OUTPUT" "$LANGUAGE"
        echo "Generated RIG: $OUTPUT ($(wc -c < "$OUTPUT") bytes)"
