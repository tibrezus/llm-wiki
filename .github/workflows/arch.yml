name: Arch

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        type: string
        default: ubuntu-latest
      node-version:
        description: Node.js version (unused by arch, kept for parity)
        type: string
        default: "20"

# The arch pipeline fetches project-published RIG JSON and commits them to
# raw/arch/, so it needs write access to contents.
permissions:
  contents: write

jobs:
  arch:
    name: Fetch + validate RIG architecture graphs
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout instance (with llm-wiki submodule)
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install pyyaml
        run: |
          if ! python3 -c 'import yaml' 2>/dev/null; then
            python3 -m pip install --user pyyaml 2>/dev/null \
              || python3 -m pip install --break-system-packages pyyaml
          fi

      - name: Install jsonschema (for RIG validation)
        run: |
          python3 -c 'import jsonschema' 2>/dev/null \
            || python3 -m pip install --user jsonschema 2>/dev/null \
            || python3 -m pip install --break-system-packages jsonschema \
            || echo "::warning::jsonschema not installed; fallback validation will be used"

      - name: Fetch + validate RIG graphs
        run: bash .llm-wiki/scripts/arch/ci-arch.sh

      - name: Commit updated raw/arch artifacts
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "llm-wiki-arch-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- raw/arch; then
            git add raw/arch
            git commit -m "chore(arch): update RIG architecture graphs [skip ci]"
            git push
            echo "Committed updated raw/arch artifacts."
          else
            echo "No changes to raw/arch artifacts."
          fi
