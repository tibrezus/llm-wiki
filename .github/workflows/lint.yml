name: Lint

on:
  workflow_call:
    inputs:
      runner:
        description: GitHub Actions runner label
        type: string
        default: ubuntu-latest
      node-version:
        description: Node.js version
        type: string
        default: "20"

jobs:
  lint:
    name: Lint, Validate, and Consistency
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Verify system tools
        run: |
          node --version
          python3 --version
          npm --version

      - name: Install consistency check dependencies
        run: |
          python3 --version
          if ! python3 -c 'import yaml' 2>/dev/null; then
            curl -sS https://bootstrap.pypa.io/get-pip.py | python3 - --break-system-packages
            python3 -m pip install --break-system-packages pyyaml
          fi
          python3 -c 'import yaml; print("pyyaml OK")'

      - name: Consistency check
        run: bash .llm-wiki/scripts/ci-consistency.sh

      - name: Run lint pipeline
        run: bash .llm-wiki/scripts/ci-lint.sh
