type: object
required:
  - title
  - type
  - created
  - updated
  - sources
  - tags
properties:
  title:
    type: string
    minLength: 5
  type:
    type: string
    enum:
      - entity
      - concept
      - guide
      - reference
  created:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  updated:
    type: string
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
  sources:
    type: array
    items:
      type: string
  tags:
    type: array
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    minItems: 2
    maxItems: 7
additionalProperties: false
