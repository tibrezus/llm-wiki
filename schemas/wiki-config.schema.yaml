type: object
required:
  - project
  - qmd
properties:
  project:
    type: object
    required:
      - name
      - title
      - description
    properties:
      name:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
      title:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      url:
        type: string
    additionalProperties: false
  qmd:
    type: object
    required:
      - global_context
    properties:
      global_context:
        type: string
        minLength: 10
      entity_context:
        type: string
      concept_context:
        type: string
      guide_context:
        type: string
      reference_context:
        type: string
    additionalProperties: false
  ci:
    type: object
    properties:
      runner:
        type: string
        default: ubuntu-latest
      node_version:
        type: string
        default: "20"
      platform:
        type: string
        default: github
        enum: [github, forgejo, gitea]
        description: Controls the workflow directory (.github/workflows, .forgejo/workflows, .gitea/workflows).
    additionalProperties: false
  arch:
    type: object
    properties:
      projects:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - rig_url
          properties:
            name:
              type: string
              pattern: "^[a-z0-9][a-z0-9-]*$"
            rig_url:
              type: string
              minLength: 1
              description: HTTPS URL where the project publishes its RIG JSON (GitHub Release asset).
            rig_token_env:
              type: string
              description: Name of the CI secret holding a read token for the project repo (private projects only). The named env var is injected by the runner from the repo/org secret.
          additionalProperties: false
    additionalProperties: false
  pages:
    type: object
    description: Per-page content rules enforced by wiki CI.
    properties:
      size_limit:
        type: integer
        default: 400
        minimum: 1
        description: Max lines per wiki/ page. Over-limit pages emit a CI annotation nudging shrink/split.
      size_strict:
        type: boolean
        default: false
        description: When true, over-limit pages fail CI instead of warning.
    additionalProperties: false
additionalProperties: false
