type: object
required:
  - project
  - qmd
properties:
  project:
    type: object
    required:
      - name
      - title
      - description
    properties:
      name:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
      title:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      url:
        type: string
    additionalProperties: false
  qmd:
    type: object
    required:
      - global_context
    properties:
      global_context:
        type: string
        minLength: 10
      entity_context:
        type: string
      concept_context:
        type: string
      guide_context:
        type: string
      reference_context:
        type: string
    additionalProperties: false
  ci:
    type: object
    properties:
      runner:
        type: string
        default: ubuntu-latest
      node_version:
        type: string
        default: "20"
    additionalProperties: false
  arch:
    type: object
    properties:
      projects:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - name
            - rig_url
          properties:
            name:
              type: string
              pattern: "^[a-z0-9][a-z0-9-]*$"
            rig_url:
              type: string
              minLength: 1
              description: HTTPS URL where the project publishes its RIG JSON (GitHub Release asset).
          additionalProperties: false
    additionalProperties: false
additionalProperties: false
